name: Feature request
description: Suggest an improvement or new feature
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Describe your idea clearly and provide context.

  - type: textarea
    id: idea
    attributes:
      label: Describe the feature
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why is this useful?
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots or examples if relevant.

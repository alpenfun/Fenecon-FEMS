name: Bug report
description: Report a problem with FEMS Diagnostics
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Please fill out all fields to help diagnose the issue.
        Issues without diagnostics may be closed.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.4.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: FEMS Diagnostics version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the problem
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics report
      description: |
        Go to:
        Settings → Devices & Services → FEMS Diagnostics → Download diagnostics

        Paste the JSON content here.
      render: json
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant Home Assistant logs here, if available.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots or any other useful context here.

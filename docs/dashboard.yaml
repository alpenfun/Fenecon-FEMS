views:
  - title: FEMS Diagnose
    path: fems-diagnose
    type: sections
    max_columns: 4
    badges:
      - type: custom:mushroom-chips-card
        alignment: justify
        chips:
          - type: template
            content: >-
              {% if is_state('binary_sensor.battery_diagnostics_systemfehler',
              'on') %}
                Systemfehler
              {% elif
              is_state('binary_sensor.battery_diagnostics_systemwarnung', 'on')
              %}
                Systemwarnung
              {% else %}
                System OK
              {% endif %}
            icon: >-
              {% if is_state('binary_sensor.battery_diagnostics_systemfehler',
              'on') %}
                mdi:alert-circle
              {% elif
              is_state('binary_sensor.battery_diagnostics_systemwarnung', 'on')
              %}
                mdi:alert
              {% else %}
                mdi:check-circle
              {% endif %}
            icon_color: >-
              {% if is_state('binary_sensor.battery_diagnostics_systemfehler',
              'on') %}
                red
              {% elif
              is_state('binary_sensor.battery_diagnostics_systemwarnung', 'on')
              %}
                amber
              {% else %}
                green
              {% endif %}
          - type: entity
            entity: binary_sensor.battery_diagnostics_rest_verbunden
            content_info: state
          - type: entity
            entity: binary_sensor.battery_diagnostics_modbus_verbunden
            content_info: state
          - type: template
            content: >-
              {% if is_state('binary_sensor.battery_diagnostics_fehler_aktiv',
              'on') %}
                Fault
              {% else %}
                Kein Fault
              {% endif %}
            icon: mdi:alert-octagon
            icon_color: >-
              {% if is_state('binary_sensor.battery_diagnostics_fehler_aktiv',
              'on') %}
                red
              {% else %}
                green
              {% endif %}
          - type: template
            content: ΔU {{ states('sensor.battery_zellspannungsdifferenz') }} V
            icon: mdi:chart-line
            icon_color: grey
    sections:
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Energiefluss
            heading_style: title
            grid_options:
              columns: 12
              rows: 1
          - type: heading
            heading: Batterie
            heading_style: title
            grid_options:
              columns: 12
              rows: 1
          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.battery_gesundheitszustand
                primary: SoH
                secondary: "{{ states('sensor.battery_gesundheitszustand') }} %"
                icon: mdi:heart-pulse
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.battery_batterie_packspannung
                primary: Packspannung
                secondary: "{{ states('sensor.battery_batterie_packspannung') }} V"
                icon: mdi:car-battery
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.battery_batteriestrom
                primary: Batteriestrom
                secondary: "{{ states('sensor.battery_batteriestrom') }} A"
                icon: mdi:current-dc
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.energy_management_batterieleistung
                primary: ESS-Leistung
                secondary: "{{ states('sensor.energy_management_batterieleistung') }} W"
                icon: mdi:flash
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.battery_ladezustand
                primary: SoC
                secondary: "{{ states('sensor.battery_ladezustand') }} %"
                icon: mdi:battery
                fill_container: true
                icon_color: >-
                  {% set soc = states('sensor.battery_ladezustand') | float(0)
                  %} {% if soc > 60 %} green {% elif soc > 30 %} amber {% else
                  %} red {% endif %}
          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.energy_management_pv_leistung
                primary: PV Gesamt
                secondary: "{{ states('sensor.energy_management_pv_leistung') }} W"
                icon: mdi:solar-power-variant
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.charger_0_leistung
                primary: PV String 1
                secondary: "{{ states('sensor.charger_0_leistung') }} W"
                icon: mdi:solar-power
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.charger_1_leistung
                primary: PV String 2
                secondary: "{{ states('sensor.charger_1_leistung') }} W"
                icon: mdi:solar-power
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.energy_management_netzleistung
                primary: Netz
                secondary: "{{ states('sensor.energy_management_netzleistung') }} W"
                icon: mdi:transmission-tower
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.energy_management_hausverbrauch
                primary: Hausverbrauch
                secondary: "{{ states('sensor.energy_management_hausverbrauch') }} W"
                icon: mdi:home-lightning-bolt
                fill_container: true
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Diagnose
            heading_style: title
          - square: false
            type: grid
            columns: 2
            cards:
              - type: markdown
                content: >-
                  ℹ️ **Hinweis zur Zellspannungsdifferenz (ΔU)**   Die Bewertung
                  basiert auf allgemeinen Erfahrungswerten und ist **keine
                  offizielle FENECON-Diagnose**.   Höhere Werte können bei
                  niedrigem Ladezustand oder unter Last normal sein.   👉 [Mehr
                  zur
                  ΔU-Interpretation](https://github.com/alpenfun/fems-diagnostics#-cell-voltage-spread-δu--δv-interpretation)
              - type: entities
                title: Zellgesundheit kompakt
                show_header_toggle: false
                entities:
                  - entity: sensor.battery_min_zellspannung
                    name: Min. Zellspannung
                  - entity: sensor.battery_max_zellspannung
                    name: Max. Zellspannung
                  - entity: sensor.battery_zellspannungsdifferenz
                    name: Zellspannungsdifferenz
                  - entity: sensor.battery_min_zelltemperatur
                    name: Min. Zelltemperatur
                  - entity: sensor.battery_max_zelltemperatur
                    name: Max. Zelltemperatur
            grid_options:
              columns: 24
              rows: auto
          - type: heading
            heading: Moduldiagnose
            heading_style: subtitle
          - square: false
            type: grid
            columns: 7
            cards:
              - type: custom:button-card
                entity: sensor.cell_diagnostics_modul_0_du
                name: M0
                show_state: true
                state_display: |
                  [[[
                    const v = Number(entity.state);
                    if (isNaN(v)) return 'n/v';
                    return v.toFixed(3) + ' V';
                  ]]]
                show_icon: true
                size: 18px
                color_type: card
                state:
                  - operator: ">="
                    value: 0.05
                    color: rgb(183, 28, 28)
                    icon: mdi:alert-circle
                  - operator: ">="
                    value: 0.02
                    color: rgb(245, 158, 11)
                    icon: mdi:alert
                  - operator: default
                    color: rgb(46, 125, 50)
                    icon: mdi:check-circle
                styles:
                  card:
                    - height: 70px
                    - border-radius: 10px
                    - padding: 8px
                  grid:
                    - grid-template-areas: '"i n" "i s"'
                    - grid-template-columns: 20px 1fr
                    - grid-template-rows: min-content min-content
                  name:
                    - justify-self: start
                    - font-size: 12px
                    - font-weight: 600
                  state:
                    - justify-self: start
                    - font-size: 12px
              - type: custom:button-card

                  - entity: >-
                      sensor.battery_diagnostics_modbus_kommunikation_fehlgeschlagen
                    name: Modbus-Kommunikation fehlgeschlagen
              - type: entities
                title: Warnungen
                show_header_toggle: false
                entities:

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Warnungen und kritische Zustände
            heading_style: title
          - type: grid
            square: false
            columns: 2
            cards:
              - type: entities
                title: Kritische Zustände
                show_header_toggle: false
                entities:
                  - entity: sensor.battery_diagnostics_alarmstatus
                    name: Alarm
                  - entity: sensor.battery_diagnostics_fehlerstatus
                    name: Fault
                  - entity: sensor.battery_diagnostics_unterspannungsfehler
                    name: Unterspannungsfehler
                  - entity: >-
                      sensor.battery_diagnostics_batterie_wegen_unterspannung_gestoppt
                    name: Batterie wegen Unterspannung gestoppt
                  - entity: sensor.battery_diagnostics_batteriestart_fehlgeschlagen

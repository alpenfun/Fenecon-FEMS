views:
  - title: FEMS Diagnose
    path: fems-diagnose
    type: sections
    max_columns: 4
    badges:
      - type: custom:mushroom-chips-card
        alignment: justify
        chips:
          - type: template
            content: |-
              {% if is_state('binary_sensor.fems_system_fehler', 'on') %}
                Systemfehler
              {% elif is_state('binary_sensor.fems_system_warnung', 'on') %}
                Systemwarnung
              {% else %}
                System OK
              {% endif %}
            icon: |-
              {% if is_state('binary_sensor.fems_system_fehler', 'on') %}
                mdi:alert-circle
              {% elif is_state('binary_sensor.fems_system_warnung', 'on') %}
                mdi:alert
              {% else %}
                mdi:check-circle
              {% endif %}
            icon_color: |-
              {% if is_state('binary_sensor.fems_system_fehler', 'on') %}
                red
              {% elif is_state('binary_sensor.fems_system_warnung', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
          - type: entity
            entity: binary_sensor.fems_rest_kommunikation
            content_info: state
            icon_color: green
          - type: entity
            entity: binary_sensor.fems_modbus_kommunikation
            content_info: state
            icon_color: green
          - type: template
            content: |-
              {% if is_state('binary_sensor.fems_fehlerstatus', 'on') %}
                Fault aktiv
              {% else %}
                Kein Fault
              {% endif %}
            icon: |-
              {% if is_state('binary_sensor.fems_fehlerstatus', 'on') %}
                mdi:alert-octagon
              {% else %}
                mdi:shield-check
              {% endif %}
            icon_color: |-
              {% if is_state('binary_sensor.fems_fehlerstatus', 'on') %}
                red
              {% else %}
                green
              {% endif %}
          - type: template
            content: ΔU {{ states('sensor.fems_zellspannungsdifferenz') }} V
            icon: mdi:sine-wave
            icon_color: >-
              {% set v = states('sensor.fems_zellspannungsdifferenz') | float(0)
              %} {% if v >= 0.05 %}red {% elif v >= 0.02 %}amber {% else %}green
              {% endif %}
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: grid
            square: false
            columns: 5
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.fems_batterie_soh
                primary: SoH
                secondary: '{{ states(''sensor.fems_batterie_soh'') }} %'
                icon: mdi:heart-pulse
                icon_color: >-
                  {% set v = states('sensor.fems_batterie_soh') | float(0) %} {%
                  if v < 70 %}red {% elif v < 85 %}amber {% else %}green {%
                  endif %}
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_batteriespannung
                primary: Packspannung
                secondary: '{{ states(''sensor.fems_batteriespannung'') }} V'
                icon: mdi:car-battery
                icon_color: blue
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_pv_leistung
                primary: PV
                secondary: '{{ states(''sensor.fems_pv_leistung'') }} W'
                icon: mdi:solar-power
                icon_color: yellow
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.grid_power
                primary: Netz
                secondary: '{{ states(''sensor.grid_power'') }} W'
                icon: mdi:transmission-tower
                icon_color: blue
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_hausverbrauch
                primary: Haus
                secondary: '{{ states(''sensor.fems_hausverbrauch'') }} W'
                icon: mdi:home-lightning-bolt
                icon_color: orange
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_batteriestrom
                primary: Batteriestrom
                secondary: '{{ states(''sensor.fems_batteriestrom'') }} A'
                icon: mdi:current-dc
                icon_color: cyan
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_ess_leistung
                primary: ESS-Leistung
                secondary: '{{ states(''sensor.fems_ess_leistung'') }} W'
                icon: mdi:flash
                icon_color: >-
                  {% set v = states('sensor.fems_ess_leistung') | float(0) %} {%
                  if v > 0 %}green {% elif v < 0 %}red {% else %}grey {% endif
                  %}
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_batterie_entladeleistung
                primary: Entladung
                secondary: '{{ states(''sensor.fems_batterie_entladeleistung'') }} W'
                icon: mdi:battery-arrow-down
                icon_color: green
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_ladegerat_0_leistung
                primary: Charger 0
                secondary: >-
                  {{ states('sensor.fems_ladegerat_0_leistung') }} W · {{
                  states('sensor.fems_ladegerat_0_spannung') }} V · {{
                  states('sensor.fems_ladegerat_0_strom') }} A
                icon: mdi:ev-station
                icon_color: blue
                multiline_secondary: true
                fill_container: true
              - type: custom:mushroom-template-card
                entity: sensor.fems_ladegerat_1_leistung
                primary: Charger 1
                secondary: >-
                  {{ states('sensor.fems_ladegerat_1_leistung') }} W · {{
                  states('sensor.fems_ladegerat_1_spannung') }} V · {{
                  states('sensor.fems_ladegerat_1_strom') }} A
                icon: mdi:ev-station
                icon_color: blue
                multiline_secondary: true
                fill_container: true
            grid_options:
              columns: 24
              rows: auto
      - type: grid
        cards:
          - type: custom:mushroom-template-card
            primary: |-
              {% if is_state('binary_sensor.fems_system_fehler', 'on') %}
                Kritischer Systemzustand erkannt
              {% elif is_state('binary_sensor.fems_system_warnung', 'on') %}
                Warnungen aktiv
              {% else %}
                Keine aktiven Fehler oder Warnungen
              {% endif %}
            secondary: |-
              {% if is_state('binary_sensor.fems_system_fehler', 'on') %}
                Bitte kritische Diagnose sofort prüfen
              {% elif is_state('binary_sensor.fems_system_warnung', 'on') %}
                Warnstatus und Zellunterspannungen prüfen
              {% else %}
                System arbeitet aktuell ohne aktive Fehler- oder Warnmeldungen
              {% endif %}
            icon: |-
              {% if is_state('binary_sensor.fems_system_fehler', 'on') %}
                mdi:alert-circle
              {% elif is_state('binary_sensor.fems_system_warnung', 'on') %}
                mdi:alert
              {% else %}
                mdi:check-circle
              {% endif %}
            icon_color: |-
              {% if is_state('binary_sensor.fems_system_fehler', 'on') %}
                red
              {% elif is_state('binary_sensor.fems_system_warnung', 'on') %}
                amber
              {% else %}
                green
              {% endif %}
            layout: horizontal
            fill_container: true
            multiline_secondary: true
            grid_options:
              columns: 24
              rows: auto
        column_span: 4
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Moduldiagnose (ΔU)
            heading_style: title
          - type: grid
            square: false
            columns: 7
            cards:
              - type: custom:button-card
                entity: sensor.fems_modul_0_spannungsdifferenz
                name: M0
                show_state: true
                state_display: |
                  [[[
                    const v = Number(entity.state);
                    if (isNaN(v)) return 'n/v';
                    return v.toFixed(3) + ' V';
                  ]]]
                show_icon: true
                size: 18px
                color_type: card
                state:
                  - operator: '>='
                    value: 0.05
                    color: rgb(183, 28, 28)
                    icon: mdi:alert-circle
                  - operator: '>='
                    value: 0.02
                    color: rgb(245, 158, 11)
                    icon: mdi:alert
                  - operator: default
                    color: rgb(46, 125, 50)
                    icon: mdi:check-circle
                styles:
                  card:
                    - height: 52px
                    - border-radius: 10px
                    - padding: 6px
                  grid:
                    - grid-template-areas: '"i n" "i s"'
                    - grid-template-columns: 18px 1fr
                    - grid-template-rows: min-content min-content
                  name:
                    - justify-self: start
                    - font-size: 11px
                    - font-weight: 600
                  state:
                    - justify-self: start
                    - font-size: 10px

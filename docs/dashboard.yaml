      - type: grid
        column_span: 4
        cards:
          - type: grid
            square: false
            columns: 3
            cards:
              - type: entities
                title: Zellgesundheit kompakt
                show_header_toggle: false
                entities:
                  - entity: sensor.fems_min_zellspannung
                    name: Min. Zellspannung
                  - entity: sensor.fems_max_zellspannung
                    name: Max. Zellspannung
                  - entity: sensor.fems_zellspannungsdifferenz
                    name: Zellspannungsdifferenz
                  - entity: sensor.fems_min_zelltemperatur
                    name: Min. Zelltemperatur
                  - entity: sensor.fems_max_zelltemperatur
                    name: Max. Zelltemperatur
                  - entity: sensor.fems_tower0_min_zellspannung
                    name: Tower 0 Min. Zellspannung
                  - entity: sensor.fems_tower0_max_zellspannung
                    name: Tower 0 Max. Zellspannung
                  - entity: sensor.fems_tower0_min_temperatur
                    name: Tower 0 Min. Temperatur
                  - entity: sensor.fems_tower0_max_temperatur
                    name: Tower 0 Max. Temperatur
              - type: entities
                title: Kritische Diagnose
                show_header_toggle: false

                    name: Warnstatus
                  - entity: sensor.fems_tower0_status_warnung
                    name: Tower 0 Warnstatus
                  - entity: sensor.fems_unterspannung_zelle_stufe_1
                    name: Zellunterspannung Stufe 1
                  - entity: sensor.fems_unterspannung_zelle_stufe_2
                    name: Zellunterspannung Stufe 2
                  - entity: sensor.fems_tower0_unterspannung_zelle_stufe_1

                  - entity: sensor.fems_batterie_entladeenergie
                    name: Batterie-Entladeenergie
            grid_options:
              columns: 15
              rows: auto
    cards: []
    header:
      card:
        type: markdown
        text_only: true
        content: |-
          # FEMS Diagnose-Dashboard
          **Diagnose, Zellüberwachung und Systemstatus für FENECON FEMS.**
      layout: start
      badges_position: bottom
      badges_wrap: wrap
